<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VYNAL • Artist Dashboard</title>
<link rel="stylesheet" href="remixicon.min.css">
<link rel="stylesheet" href="app.css">
<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // --- Supabase Config & Client ---
    const SUPABASE_URL = "https://jcrbwmpapgovyqaxajlb.supabase.co";
    const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmJ3bXBhcGdvdnlxYXhhamxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNDc2NjAsImV4cCI6MjA3MjYyMzY2MH0.7jMgdHQGWfAsQ9b5C2gn8z7YqFLuA6gR_gIF0VIW56M";

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- SPA Core Elements ---
    const contentDiv = document.getElementById("contentize");
    const navLinks = document.querySelectorAll("nav a");
    const pageList = [
        "mall.html",
        "start.html",
        "states.html",
        "statehome.html",
        "profile.html",
        "upload.html",
    ];

    let isTransitioning = false;
    const pageCache = {}; // cache for faster reloads

    // --- Global State ---
    window.currentUser = null;
    let currentPostId = null;

    // --- Utility Functions ---
    // Function to find an element in the currently loaded page
    function getElement(selector) {
        return contentDiv.querySelector(selector) || document.getElementById(selector);
    }
    
    // --- Auth, Data Fetching & UI Rendering ---
    // This is the main function that runs after a page is loaded
    async function initPage() {
        // --- AUTH CHECK & UI UPDATE ---
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
            return;
        }
        window.currentUser = session.user;
        displayUserInfo(session.user);

        // --- ATTACH LISTENERS & RENDER CONTENT BASED ON PAGE ---
        const pageName = location.hash.replace("#", "") || "start.html";
        switch (pageName) {
            case "start.html":
                await fetchAndRenderPosts();
                setupPostInteractions();
                break;
            case "profile.html":
                // Logic for profile page if needed
                break;
            case "upload.html":
                setupUploadModal();
                break;
            // Add other pages here as needed
        }
    }

    function displayUserInfo(user) {
        const userNameEl = getElement("user-name");
        const userEmailEl = getElement("user-email");
        const userPicEl = getElement("user-pic");
        const logoutBtn = getElement("logout-btn");

        if (userNameEl) userNameEl.textContent = user.user_metadata?.full_name || "No Name";
        if (userEmailEl) userEmailEl.textContent = user.email || "No Email";
        if (userPicEl) {
            userPicEl.src = user.user_metadata?.avatar_url || "default-avatar.png";
            userPicEl.alt = user.user_metadata?.full_name || "User Avatar";
        }
        if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
                await sb.auth.signOut();
                window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
            });
        }
    }

    function setupUploadModal() {
        const uploadModal = getElement('uploadModal');
        const uploadBtn = getElement('.upload-btn');
        const uploadCloseBtn = getElement('uploadClose');
        const uploadForm = getElement('uploadForm');

        if (uploadBtn) {
            uploadBtn.addEventListener('click', () => {
                uploadModal.classList.remove('hidden');
            });
        }
        if (uploadCloseBtn) {
            uploadCloseBtn.addEventListener('click', () => {
                uploadModal.classList.add('hidden');
            });
        }
        if (uploadForm) {
            uploadForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = getElement('uTitle').value;
                const description = getElement('uDesc').value;
                const genre = getElement('uGenre').value;
                const tags = getElement('uTags').value.split(',').map(tag => tag.trim());
                const coverFile = getElement('uCover').files[0];
                const userId = window.currentUser.id;

                if (!title || !coverFile) {
                    alert('Title and cover image are required.');
                    return;
                }

                try {
                    const filePath = `${userId}/${Date.now()}_${coverFile.name}`;
                    const { error: storageError } = await sb.storage
                        .from('post-covers')
                        .upload(filePath, coverFile);
                    if (storageError) throw storageError;

                    const { data: publicUrlData } = sb.storage.from('post-covers').getPublicUrl(filePath);
                    const mediaUrl = publicUrlData.publicUrl;

                    const { error: insertError } = await sb
                        .from('posts')
                        .insert({
                            user_id: userId,
                            title: title,
                            description: description,
                            media_url: mediaUrl,
                            genre: genre,
                            tags: tags,
                        });
                    if (insertError) throw insertError;

                    alert('Post uploaded successfully!');
                    uploadForm.reset();
                    uploadModal.classList.add('hidden');
                } catch (error) {
                    console.error('Error uploading post:', error);
                    alert('Failed to upload post: ' + error.message);
                }
            });
        }
    }

    async function fetchAndRenderPosts() {
        const postFeedContainer = getElement('post-feed-container');
        if (!postFeedContainer) return;
        postFeedContainer.innerHTML = '';
        try {
            const { data: posts, error } = await sb
                .from('posts')
                .select('*, profiles!fk_user(full_name, avatar_url), comments(id), likes(post_id)')
                .order('created_at', { ascending: false });

            if (error) throw error;
            if (!posts || posts.length === 0) {
                postFeedContainer.innerHTML = '<p class="muted" style="text-align: center;">No posts found. Be the first to share! 🚀</p>';
                return;
            }
            posts.forEach(post => {
                const postElement = createPostElement(post);
                postFeedContainer.appendChild(postElement);
            });
        } catch (error) {
            console.error('Error fetching posts:', error);
            postFeedContainer.innerHTML = '<p class="error">⚠️ Could not load posts.</p>';
        }
    }

    function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'span-4 post-card';
        postElement.dataset.postId = post.id;
        postElement.dataset.animate = true;
        const commentCount = post.comments?.length || 0;
        const likeCount = post.likes?.length || 0;
        const postHtml = `
            <div class="post-header">
                <div class="post-header-left">
                    <img src="${post.profiles?.avatar_url || 'default-avatar.png'}" alt="avatar">
                    <div class="post-header-info">
                        <strong>${post.profiles?.full_name || 'Anonymous'}</strong>
                        <div class="muted">${new Date(post.created_at).toLocaleString()}</div>
                    </div>
                </div>
                <div class="post-header-right">
                    <button class="menu-btn"><i class="ri-more-2-fill"></i></button>
                </div>
            </div>
            <div class="post-body">
                ${post.title || ''}
                ${post.description ? `<br>${post.description}` : ''}
                ${(post.tags && post.tags.length > 0) ? `<br><span class="hashtag">#${post.tags.join(' #')}</span>` : ''}
            </div>
            ${post.media_url ? `<div class="post-media"><img src="${post.media_url}" alt="Post media"></div>` : ''}
            <div class="post-actions">
                <button class="action-btn like-btn" data-post-id="${post.id}"><i class="ri-heart-line"></i><span>${likeCount}</span></button>
                <button class="action-btn comment-btn" data-post-id="${post.id}"><i class="ri-chat-3-line"></i><span>${commentCount}</span></button>
                <button class="action-btn share-btn"><i class="ri-share-forward-line"></i></button>
                <button class="action-btn"><i class="ri-bookmark-line"></i></button>
            </div>
        `;
        postElement.innerHTML = postHtml;
        return postElement;
    }

    function setupPostInteractions() {
        const commentModal = getElement('CommentModal');
        const commentCloseBtn = getElement('commentClose');
        const commentForm = getElement('commentForm');
        const commentInput = getElement('commentText');

        if (commentCloseBtn) {
            commentCloseBtn.addEventListener('click', () => {
                commentModal.classList.add('hidden');
            });
        }

        document.addEventListener('click', async (e) => {
            const likeBtn = e.target.closest('.like-btn');
            if (likeBtn) {
                const postId = likeBtn.dataset.postId;
                await likePost(postId);
            }
            const commentBtn = e.target.closest('.comment-btn');
            if (commentBtn) {
                currentPostId = commentBtn.dataset.postId;
                commentModal.classList.remove('hidden');
                await fetchAndRenderComments(currentPostId);
            }
        });

        if (commentForm) {
            commentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const content = commentInput.value.trim();
                if (content && currentPostId) {
                    await postComment(currentPostId, content);
                    commentInput.value = '';
                }
            });
        }
    }

    async function likePost(postId) {
        try {
            const userId = window.currentUser.id;
            const { error } = await sb
                .from('likes')
                .insert({ user_id: userId, post_id: postId });
            if (error && error.code !== '23505') throw error;
        } catch (error) {
            console.error('Error liking post:', error);
            alert('Failed to like post: ' + error.message);
        }
    }

    async function postComment(postId, content) {
        try {
            const userId = window.currentUser.id;
            const { error } = await sb
                .from('comments')
                .insert({ user_id: userId, post_id: postId, content: content });
            if (error) throw error;
            console.log('Comment posted successfully!');
        } catch (error) {
            console.error('Error posting comment:', error);
            alert('Failed to post comment: ' + error.message);
        }
    }

    async function fetchAndRenderComments(postId) {
        const commentsContainer = getElement('.comments');
        if (!commentsContainer) return;
        commentsContainer.innerHTML = '<div style="text-align:center;">Loading comments...</div>';
        try {
            const { data: comments, error } = await sb
                .from('comments')
                .select('*, profiles!comments_user_id_fkey(full_name, avatar_url)')
                .eq('post_id', postId)
                .order('created_at', { ascending: true });
            if (error) throw error;
            commentsContainer.innerHTML = '';
            if (comments.length === 0) {
                commentsContainer.innerHTML = '<div class="muted" style="text-align: center;">No comments yet.</div>';
            }
            comments.forEach(comment => {
                const commentHtml = `
                    <div class="comment">
                        <div class="comment-avatar">
                            <img src="${comment.profiles?.avatar_url || 'default-avatar.png'}" alt="${comment.profiles?.full_name || 'Anonymous'}">
                        </div>
                        <div class="comment-body">
                            <div class="comment-header">
                                <span class="comment-author">@${comment.profiles?.full_name || 'Anonymous'}</span>
                                <div class="comment-like">
                                    <i class="ri-heart-line"></i> <span>0</span>
                                </div>
                            </div>
                            <div class="comment-text">${comment.content || ''}</div>
                            <div class="comment-footer">
                                <span>Reply</span>
                                <span>Report</span>
                                <span class="comment-time">${new Date(comment.created_at).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
                commentsContainer.insertAdjacentHTML('beforeend', commentHtml);
            });
        } catch (error) {
            console.error('Error fetching comments:', error);
            commentsContainer.innerHTML = '<div class="error" style="text-align:center;">⚠️ Could not load comments.</div>';
        }
    }

    // --- Real-time Listeners ---
    function setupRealtimeListeners() {
        sb.channel('public:posts')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => fetchAndRenderPosts())
            .subscribe();

        sb.channel('public:comments')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, payload => {
                if (payload.new.post_id === currentPostId) {
                    fetchAndRenderComments(currentPostId);
                }
                fetchAndRenderPosts();
            })
            .subscribe();

        sb.channel('public:likes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'likes' }, () => fetchAndRenderPosts())
            .subscribe();
    }

    // --- SPA Loader (Unchanged) ---
    async function loadPage(url, addToHistory = true) {
        if (isTransitioning) return;
        isTransitioning = true;
        try {
            contentDiv.classList.add("fade-out");
            setTimeout(async () => {
                try {
                    let html;
                    if (pageCache[url]) {
                        html = pageCache[url];
                    } else {
                        const response = await fetch(url, { cache: "force-cache" });
                        html = await response.text();
                        pageCache[url] = html;
                    }
                    contentDiv.innerHTML = html;
                    if (typeof initSliders === "function") initSliders();
                    window.scrollTo({ top: 0, behavior: "smooth" });
                    highlightActiveLink(url);
                    if (addToHistory) history.pushState({ url }, null, "#" + url);
                    
                    // --- THE FIX: CALL initPage() AFTER THE NEW CONTENT IS LOADED ---
                    await initPage();

                    contentDiv.classList.remove("fade-out");
                    contentDiv.classList.add("fade-in");
                    setTimeout(() => {
                        contentDiv.classList.remove("fade-in");
                        isTransitioning = false;
                    }, 150);
                } catch (error) {
                    contentDiv.innerHTML = "<h2 class='error'>⚠️ Page not found</h2>";
                    isTransitioning = false;
                }
            }, 100);
        } catch (error) {
            console.error("❌ Load error:", error);
            isTransitioning = false;
        }
    }

    function highlightActiveLink(url) {
        navLinks.forEach(link => {
            link.classList.toggle("active", link.getAttribute("href") === "#" + url);
        });
    }

    function initSPA() {
        pageList.forEach(async (page) => {
            try {
                const res = await fetch(page, { cache: "force-cache" });
                pageCache[page] = await res.text();
            } catch {}
        });

        let currentPage = location.hash.replace("#", "") || "start.html";
        if (!pageList.includes(currentPage)) currentPage = "start.html";
        loadPage(currentPage, false);
        history.replaceState({ url: currentPage }, null, "#" + currentPage);

        document.addEventListener("click", (e) => {
            const link = e.target.closest("a[data-link]");
            if (link) {
                e.preventDefault();
                const url = link.getAttribute("href").replace("#", "");
                const current = location.hash.replace("#", "") || "start.html";
                if (url === current) return;
                if (pageList.includes(url)) {
                    loadPage(url, true);
                }
            }
        });

        window.addEventListener("popstate", (e) => {
            if (e.state && e.state.url) {
                loadPage(e.state.url, false);
            }
        });
    }

    // --- Start the App ---
    setupRealtimeListeners();
    initSPA();
</script>






</head>

<script>
  function toggleReplies(el) {
  const replies = el.nextElementSibling;
  if (replies.style.display === "block") {
    replies.style.display = "none";
    el.textContent = el.dataset.original || "View replies";
  } else {
    replies.style.display = "block";
    if (!el.dataset.original) el.dataset.original = el.textContent;
    el.textContent = "Hide replies";
  }
}

</script>
