<head>

<link rel="stylesheet" href="app.css">
<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// --- Supabase Config ---
const SUPABASE_URL = "https://jcrbwmpapgovyqaxajlb.supabase.co";
const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmJ3bXBhcGdvdnlxYXhhamxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNDc2NjAsImV4cCI6MjA3MjYyMzY2MH0.7jMgdHQGWfAsQ9b5C2gn8z7YqFLuA6gR_gIF0VIW56M";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- DOM Elements ---
const contentDiv = document.getElementById("contentize");
const userNameEl = document.getElementById("user-name");
const userEmailEl = document.getElementById("user-email");
const userPicEl = document.getElementById("user-pic");
const logoutBtn = document.getElementById("logout-btn");

// Elements for Upload Modal
const uploadModal = document.getElementById('uploadModal');
const uploadBtn = document.querySelector('.upload-btn');
const uploadCloseBtn = document.getElementById('uploadClose');
const uploadForm = document.getElementById('uploadForm');

// Elements for Comment Modal
const commentModal = document.getElementById('CommentModal');
const commentCloseBtn = document.getElementById('commentClose');
const commentsContainer = commentModal.querySelector('.comments');
let currentPostId = null;

// --- AUTH CHECK ---
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
    return;
  }

  console.log("✅ Logged in as:", session.user.email);
  window.currentUser = session.user;

  displayUserInfo(session.user);
  fetchAndRenderPosts(); // Call post rendering directly
}

// --- Display User Info ---
function displayUserInfo(user) {
  if (userNameEl) userNameEl.textContent = user.user_metadata.full_name || "No Name";
  if (userEmailEl) userEmailEl.textContent = user.email || "No Email";
  if (userPicEl) {
    userPicEl.src = user.user_metadata.avatar_url || "default-avatar.png";
    userPicEl.alt = user.user_metadata.full_name || "User Avatar";
  }
}

// --- Logout Handler ---
if (logoutBtn) {
  logoutBtn.addEventListener("click", async () => {
    await sb.auth.signOut();
    window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
  });
}

// --- Listen for logout or expired session ---
sb.auth.onAuthStateChange((_event, session) => {
  if (!session) {
    window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
  }
});

// --- Upload Logic ---
if (uploadBtn) {
  uploadBtn.addEventListener('click', () => {
    uploadModal.classList.remove('hidden');
  });
}
if (uploadCloseBtn) {
  uploadCloseBtn.addEventListener('click', () => {
    uploadModal.classList.add('hidden');
  });
}

if (uploadForm) {
  uploadForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('uTitle').value;
    const description = document.getElementById('uDesc').value;
    const genre = document.getElementById('uGenre').value;
    const tags = document.getElementById('uTags').value.split(',').map(tag => tag.trim());
    const coverFile = document.getElementById('uCover').files[0];
    const userId = window.currentUser.id;

    if (!title || !coverFile) {
      alert('Title and cover image are required.');
      return;
    }

    try {
      const filePath = `${userId}/${Date.now()}_${coverFile.name}`;
      const { data: storageData, error: storageError } = await sb.storage
        .from('post-covers')
        .upload(filePath, coverFile);

      if (storageError) throw storageError;

      const { data: publicUrlData } = sb.storage
        .from('post-covers')
        .getPublicUrl(filePath);
      const mediaUrl = publicUrlData.publicUrl;

      const { error: insertError } = await sb
        .from('posts')
        .insert({
          user_id: userId,
          title: title,
          description: description,
          media_url: mediaUrl,
          genre: genre,
          tags: tags,
        });

      if (insertError) throw insertError;

      alert('Post uploaded successfully!');
      uploadForm.reset();
      uploadModal.classList.add('hidden');
      fetchAndRenderPosts(); // Re-render posts after upload
    } catch (error) {
      console.error('Error uploading post:', error);
      alert('Failed to upload post: ' + error.message);
    }
  });
}

async function fetchAndRenderPosts() {
    const postFeedContainer = document.getElementById('post-feed-container');
    if (!postFeedContainer) return;

    postFeedContainer.innerHTML = '';
    try {
        const { data: posts, error } = await sb
            .from('posts')
            .select('*, profiles(full_name, avatar_url), comments(id), likes(id)')
            .order('created_at', { ascending: false });

        if (error) throw error;
        if (posts.length === 0) {
            postFeedContainer.innerHTML = '<p class="muted" style="text-align: center;">No posts found. Be the first to share! 🚀</p>';
            return;
        }

        posts.forEach(post => {
            const postElement = document.createElement('div');
            postElement.className = 'span-4 post-card';
            postElement.dataset.postId = post.id;
            postElement.dataset.animate = true;

            // Correctly get the counts from the fetched data
            const commentCount = post.comments ? post.comments.length : 0;
            const likeCount = post.likes ? post.likes.length : 0;

            const postHtml = `
            <div class="post-header">
                <div class="post-header-left">
                    <img src="${post.profiles.avatar_url || 'default-avatar.png'}" alt="avatar">
                    <div class="post-header-info">
                        <strong>${post.profiles.full_name || 'Anonymous'}</strong>
                        <div class="muted">${new Date(post.created_at).toLocaleString()}</div>
                    </div>
                </div>
                <div class="post-header-right">
                    <button class="menu-btn"><i class="ri-more-2-fill"></i></button>
                </div>
            </div>
            <div class="post-body">
                ${post.title}
                ${post.description ? `<br>${post.description}` : ''}
                ${post.tags.length > 0 ? `<br><span class="hashtag">#${post.tags.join(' #')}</span>` : ''}
            </div>
            ${post.media_url ? `<div class="post-media"><img src="${post.media_url}" alt="Post media"></div>` : ''}
            <div class="post-actions">
                <button class="action-btn like-btn" data-post-id="${post.id}"><i class="ri-heart-line"></i><span>${likeCount}</span></button>
                <button class="action-btn comment-btn" data-post-id="${post.id}"><i class="ri-chat-3-line"></i><span>${commentCount}</span></button>
                <button class="action-btn share-btn"><i class="ri-share-forward-line"></i></button>
                <button class="action-btn"><i class="ri-bookmark-line"></i></button>
            </div>
        `;
            postElement.innerHTML = postHtml;
            postFeedContainer.appendChild(postElement);
        });
    } catch (error) {
        console.error('Error fetching posts:', error);
        postFeedContainer.innerHTML = '<p class="error">⚠️ Could not load posts.</p>';
    }
}

// Comments modal management
if (commentCloseBtn) {
  commentCloseBtn.addEventListener('click', () => {
    commentModal.classList.add('hidden');
  });
}

document.addEventListener('click', async (e) => {
  const commentBtn = e.target.closest('.comment-btn');
  if (commentBtn) {
    currentPostId = commentBtn.dataset.postId;
    commentModal.classList.remove('hidden');
    await fetchAndRenderComments(currentPostId);
  }
});

async function fetchAndRenderComments(postId) {
  commentsContainer.innerHTML = '<div style="text-align:center;">Loading comments...</div>';
  try {
    const { data: comments, error } = await sb
      .from('comments')
      .select('*, profiles(full_name, avatar_url)')
      .eq('post_id', postId)
      .order('created_at', { ascending: true });

    if (error) throw error;
    commentsContainer.innerHTML = '';
    if (comments.length === 0) {
      commentsContainer.innerHTML = '<div class="muted" style="text-align: center;">No comments yet.</div>';
    }

    comments.forEach(comment => {
      const commentHtml = `
        <div class="comment">
            <div class="comment-avatar">
                <img src="${comment.profiles.avatar_url || 'default-avatar.png'}" alt="${comment.profiles.full_name}">
            </div>
            <div class="comment-body">
                <div class="comment-header">
                    <span class="comment-author">@${comment.profiles.full_name || 'Anonymous'}</span>
                    <div class="comment-like">
                        <i class="ri-heart-line"></i> <span>${comment.likes}</span>
                    </div>
                </div>
                <div class="comment-text">${comment.content}</div>
                <div class="comment-footer">
                    <span>Reply</span>
                    <span>Report</span>
                    <span class="comment-time">${new Date(comment.created_at).toLocaleString()}</span>
                </div>
            </div>
        </div>
      `;
      commentsContainer.insertAdjacentHTML('beforeend', commentHtml);
    });
  } catch (error) {
    console.error('Error fetching comments:', error);
    commentsContainer.innerHTML = '<div class="error" style="text-align:center;">⚠️ Could not load comments.</div>';
  }
}

// --- Start the App ---
checkAuth();
  </script>


</head>

<script>
  function toggleReplies(el) {
  const replies = el.nextElementSibling;
  if (replies.style.display === "block") {
    replies.style.display = "none";
    el.textContent = el.dataset.original || "View replies";
  } else {
    replies.style.display = "block";
    if (!el.dataset.original) el.dataset.original = el.textContent;
    el.textContent = "Hide replies";
  }
}

</script>

<script>
  window.addEventListener("load", () => {
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("content").style.display = "block";
      document.getElementById("content").classList.add("fade-in");
    }, 2800);
  });
