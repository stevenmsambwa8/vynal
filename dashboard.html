<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    nav a.active { font-weight: bold; }
    .profile, .post-form, .posts { margin-bottom: 30px; }
    img { max-width: 100px; border-radius: 50%; }
    .post { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 10px; }
    .actions button { margin-right: 10px; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>

  <!-- Navigation -->
  <nav>
    <a data-link>Home</a>
    <a data-link>Mall</a>
    <a href="#profile.html" data-link>Profile</a>
    <a  data-link>Upload</a>
    <button id="logout-btn">Logout</button>
  </nav>

  <div id="contentize">
    <!-- Profile Section -->
    <div class="profile">
      <h2>Profile</h2>
      <img id="user-pic" src="" alt="Profile Picture">
      <p><strong>Name:</strong> <span id="user-name"></span></p>
      <p><strong>Email:</strong> <span id="user-email"></span></p>
      <input type="text" id="username" placeholder="Edit username">
      <input type="file" id="profile-upload">
      <button id="save-profile">Save Profile</button>
    </div>

    <!-- Post Form -->
    <div class="post-form">
      <h2>Create Post</h2>
      <textarea id="post-content" placeholder="Write something..."></textarea><br>
      <select id="post-type">
        <option value="text">Text</option>
        <option value="image">Image</option>
        <option value="link">Link</option>
      </select><br>
      <input type="file" id="post-image"><br>
      <button id="submit-post">Post</button>
    </div>

    <!-- Posts Section -->
    <div class="posts">
      <h2>All Posts</h2>
      <div id="posts-container"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://jcrbwmpapgovyqaxajlb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmJ3bXBhcGdvdnlxYXhhamxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNDc2NjAsImV4cCI6MjA3MjYyMzY2MH0.7jMgdHQGWfAsQ9b5C2gn8z7YqFLuA6gR_gIF0VIW56M";
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const contentDiv = document.getElementById("contentize");
    const navLinks = document.querySelectorAll("nav a");
    const userNameEl = document.getElementById("user-name");
    const userEmailEl = document.getElementById("user-email");
    const userPicEl = document.getElementById("user-pic");
    const logoutBtn = document.getElementById("logout-btn");

    const pageList = ["mall.html", "start.html", "states.html", "statehome.html", "profile.html", "upload.html"];
    let isTransitioning = false;
    const pageCache = {};
    let currentUser = null;

    async function checkAuth() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = "dashboard.html";
        return;
      }
      currentUser = session.user;
      displayUserInfo(currentUser);
      initSPA();
      loadPosts();
    }

    function displayUserInfo(user) {
      if (userNameEl) userNameEl.textContent = user.user_metadata.username || "No Name";
      if (userEmailEl) userEmailEl.textContent = user.email;
      if (userPicEl) userPicEl.src = user.user_metadata.avatar_url || "default-avatar.png";
    }

    if (logoutBtn) {
      logoutBtn.addEventListener("click", async () => {
        await sb.auth.signOut();
        window.location.href = "register.html";
      });
    }

    sb.auth.onAuthStateChange((_event, session) => {
      if (!session) window.location.href = "register.html";
    });

    async function saveProfile() {
      const username = document.getElementById("username").value;
      const file = document.getElementById("profile-upload").files[0];
      let avatar_url = currentUser.user_metadata?.avatar_url;

      if (file) {
        const path = `${currentUser.id}/${file.name}`;
        const { error } = await sb.storage.from("avatars").upload(path, file, { upsert: true });
        if (!error) avatar_url = `${SUPABASE_URL}/storage/v1/object/public/avatars/${path}`;
      }
      await sb.auth.updateUser({ data: { username, avatar_url } });
      alert("Profile updated");
      displayUserInfo({ ...currentUser, user_metadata: { username, avatar_url } });
    }

    async function submitPost() {
      const content = document.getElementById("post-content").value;
      const type = document.getElementById("post-type").value;
      const file = document.getElementById("post-image").files[0];
      let image_url = null;

      if (file && type === "image") {
        const path = `${currentUser.id}/${Date.now()}-${file.name}`;
        const { error } = await sb.storage.from("posts").upload(path, file, { upsert: true });
        if (!error) image_url = `${SUPABASE_URL}/storage/v1/object/public/posts/${path}`;
      }

      await sb.from("posts").insert({ user_id: currentUser.id, content, type, image_url });
      document.getElementById("post-content").value = "";
      loadPosts();
    }

    async function loadPosts() {
      const { data: posts } = await sb.from("posts").select("*").order("created_at", { ascending: false });
      const container = document.getElementById("posts-container");
      container.innerHTML = "";
      posts.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <p><strong>${p.type.toUpperCase()}</strong>: ${p.content}</p>
          ${p.image_url ? `<img src="${p.image_url}" style="max-width:200px;">` : ""}
          <p><em>${new Date(p.created_at).toLocaleString()}</em></p>
          <div class="actions">
            <button>Like</button>
            <button>Comment</button>
            <button>Delete</button>
          </div>`;
        container.appendChild(div);
      });
    }

    async function loadPage(url, addToHistory = true) {
      if (isTransitioning) return;
      isTransitioning = true;
      try {
        contentDiv.classList.add("fade-out");
        setTimeout(async () => {
          try {
            let html = pageCache[url] || await (await fetch(url, { cache: "force-cache" })).text();
            pageCache[url] = html;
            contentDiv.innerHTML = html;
            highlightActiveLink(url);
            if (addToHistory) history.pushState({ url }, null, "#" + url);
            contentDiv.classList.remove("fade-out");
            isTransitioning = false;
          } catch { isTransitioning = false; }
        }, 100);
      } catch { isTransitioning = false; }
    }

    function highlightActiveLink(url) {
      navLinks.forEach(link => link.classList.toggle("active", link.getAttribute("href") === "#" + url));
    }

    function initSPA() {
      pageList.forEach(async (page) => {
        try { pageCache[page] = await (await fetch(page, { cache: "force-cache" })).text(); } catch {}
      });
      let currentPage = location.hash.replace("#", "") || "";
      if (!pageList.includes(currentPage)) currentPage = "";
      loadPage(currentPage, false);
      history.replaceState({ url: currentPage }, null, "#" + currentPage);
      document.addEventListener("click", (e) => {
        const link = e.target.closest("a[data-link]");
        if (link) {
          e.preventDefault();
          const url = link.getAttribute("href").replace("#", "");
          if (pageList.includes(url)) loadPage(url, true);
        }
      });
      window.addEventListener("popstate", (e) => {
        if (e.state?.url) loadPage(e.state.url, false);
      });
    }

    document.getElementById("save-profile").addEventListener("click", saveProfile);
    document.getElementById("submit-post").addEventListener("click", submitPost);

    checkAuth();
  </script>
</body>
</html>
