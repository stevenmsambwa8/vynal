<!DOCTYPE html>  
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VYNAL • Artist Dashboard</title>
<link rel="stylesheet" href="remixicon.min.css">
<link rel="stylesheet" href="app.css">
<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // --- Supabase Config ---
    const SUPABASE_URL = "https://jcrbwmpapgovyqaxajlb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmJ3bXBhcGdvdnlxYXhhamxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNDc2NjAsImV4cCI6MjA3MjYyMzY2MH0.7jMgdHQGWfAsQ9b5C2gn8z7YqFLuA6gR_gIF0VIW56M";
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- Global Variables ---
    let isTransitioning = false;
    const pageCache = {};
    const pageList = ["mall.html", "start.html", "states.html", "statehome.html", "profile.html", "upload.html"];
    
    // Global State
    window.currentUser = null;
    let currentPostId = null;

    // --- DOM Elements (will be dynamically found) ---
    let contentDiv, navLinks, userNameEl, userEmailEl, userPicEl, logoutBtn;
    let postFeedContainer, commentForm, commentInput;
    let uploadModal, uploadBtn, uploadCloseBtn, uploadForm;
    let commentModal, commentCloseBtn, commentsContainer;

    // --- Utility Functions ---
    function getElement(selector) {
        return contentDiv?.querySelector(selector) || document.getElementById(selector) || document.querySelector(selector);
    }

    function updateDOMReferences() {
        contentDiv = document.getElementById("contentize");
        navLinks = document.querySelectorAll("nav a");
        userNameEl = getElement("user-name");
        userEmailEl = getElement("user-email");
        userPicEl = getElement("user-pic");
        logoutBtn = getElement("logout-btn");
        postFeedContainer = getElement('post-feed-container');
        commentForm = getElement('commentForm');
        commentInput = getElement('commentText');
        uploadModal = getElement('uploadModal');
        uploadBtn = getElement('.upload-btn');
        uploadCloseBtn = getElement('uploadClose');
        uploadForm = getElement('uploadForm');
        commentModal = getElement('CommentModal');
        commentCloseBtn = getElement('commentClose');
        commentsContainer = commentModal?.querySelector('.comments');
    }

    // --- Auth Functions ---
    async function checkAuth() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
            window.location.href = "https://vynal.it.com/register.html";
            return false;
        }
        window.currentUser = session.user;
        return true;
    }

    function displayUserInfo(user) {
        if (userNameEl) userNameEl.textContent = user.user_metadata?.full_name || "No Name";
        if (userEmailEl) userEmailEl.textContent = user.email || "No Email";
        if (userPicEl) {
            userPicEl.src = user.user_metadata?.avatar_url || "default-avatar.png";
            userPicEl.alt = user.user_metadata?.full_name || "User Avatar";
        }
    }

    // --- SPA Navigation ---
    async function loadPage(url, addToHistory = true) {
        if (isTransitioning) return;
        isTransitioning = true;

        try {
            if (contentDiv) contentDiv.classList.add("fade-out");

            setTimeout(async () => {
                try {
                    let html;
                    if (pageCache[url]) {
                        html = pageCache[url];
                    } else {
                        const response = await fetch(url, { cache: "force-cache" });
                        html = await response.text();
                        pageCache[url] = html;
                    }

                    if (contentDiv) {
                        contentDiv.innerHTML = html;
                        updateDOMReferences();
                        await initPage();
                    }

                    if (typeof initSliders === "function") {
                        initSliders();
                    }

                    window.scrollTo({ top: 0, behavior: "smooth" });
                    highlightActiveLink(url);

                    if (addToHistory) {
                        history.pushState({ url }, null, "#" + url);
                    }

                    if (contentDiv) {
                        contentDiv.classList.remove("fade-out");
                        contentDiv.classList.add("fade-in");
                    }

                    setTimeout(() => {
                        if (contentDiv) {
                            contentDiv.classList.remove("fade-in");
                        }
                        isTransitioning = false;
                    }, 150);
                } catch (error) {
                    console.error("Page load error:", error);
                    if (contentDiv) {
                        contentDiv.innerHTML = "<h2 class='error'>⚠️ Page not found</h2>";
                    }
                    isTransitioning = false;
                }
            }, 100);
        } catch (error) {
            console.error("❌ Load error:", error);
            isTransitioning = false;
        }
    }

    function highlightActiveLink(url) {
        if (navLinks) {
            navLinks.forEach(link => {
                link.classList.toggle("active", link.getAttribute("href") === "#" + url);
            });
        }
    }

    // --- Page Initialization ---
    async function initPage() {
        if (window.currentUser) {
            displayUserInfo(window.currentUser);
        }

        setupEventListeners();

        const pageName = location.hash.replace("#", "") || "start.html";
        switch (pageName) {
            case "start.html":
                await fetchAndRenderPosts();
                break;
            case "profile.html":
                break;
            case "upload.html":
                break;
            case "statehome.html":
                break;
        }
    }

    // --- Event Listeners Setup ---
    function setupEventListeners() {
        if (logoutBtn && !logoutBtn.hasAttribute('data-listener')) {
            logoutBtn.setAttribute('data-listener', 'true');
            logoutBtn.addEventListener("click", async () => {
                await sb.auth.signOut();
                window.location.href = "https://vynal.it.com/register.html";
            });
        }

        if (uploadBtn && !uploadBtn.hasAttribute('data-listener')) {
            uploadBtn.setAttribute('data-listener', 'true');
            uploadBtn.addEventListener('click', () => {
                if (uploadModal) uploadModal.classList.remove('hidden');
            });
        }

        if (uploadCloseBtn && !uploadCloseBtn.hasAttribute('data-listener')) {
            uploadCloseBtn.setAttribute('data-listener', 'true');
            uploadCloseBtn.addEventListener('click', () => {
                if (uploadModal) uploadModal.classList.add('hidden');
            });
        }

        if (uploadForm && !uploadForm.hasAttribute('data-listener')) {
            uploadForm.setAttribute('data-listener', 'true');
            uploadForm.addEventListener('submit', handleUploadSubmit);
        }

        if (commentCloseBtn && !commentCloseBtn.hasAttribute('data-listener')) {
            commentCloseBtn.setAttribute('data-listener', 'true');
            commentCloseBtn.addEventListener('click', () => {
                if (commentModal) commentModal.classList.add('hidden');
            });
        }
    }

    // --- Upload Handler ---
    async function handleUploadSubmit(e) {
        e.preventDefault();
        const title = getElement('uTitle')?.value;
        const description = getElement('uDesc')?.value;
        const genre = getElement('uGenre')?.value;
        const tags = getElement('uTags')?.value.split(',').map(tag => tag.trim());
        const coverFile = getElement('uCover')?.files[0];
        const userId = window.currentUser.id;

        if (!title || !coverFile) {
            alert('Title and cover image are required.');
            return;
        }

        try {
            const filePath = `${userId}/${Date.now()}_${coverFile.name}`;
            const { error: storageError } = await sb.storage
                .from('post-covers')
                .upload(filePath, coverFile);
            if (storageError) throw storageError;

            const { data: publicUrlData } = sb.storage.from('post-covers').getPublicUrl(filePath);
            const mediaUrl = publicUrlData.publicUrl;

            const { error: insertError } = await sb
                .from('posts')
                .insert({
                    user_id: userId,
                    title: title,
                    description: description,
                    media_url: mediaUrl,
                    genre: genre,
                    tags: tags,
                });
            if (insertError) throw insertError;

            alert('Post uploaded successfully!');
            if (uploadForm) uploadForm.reset();
            if (uploadModal) uploadModal.classList.add('hidden');
            
            // Refresh posts after successful upload
            await fetchAndRenderPosts();
        } catch (error) {
            console.error('Error uploading post:', error);
            alert('Failed to upload post: ' + error.message);
        }
    }

    // --- Comment Handler ---
    async function handleCommentSubmit(e) {
        e.preventDefault();
        const commentInput = e.target.querySelector('textarea[name="commentText"]');
        const content = commentInput?.value.trim();
        
        if (content && currentPostId) {
            await postComment(currentPostId, content);
            commentInput.value = '';
            // Refresh comments after posting
            await fetchAndRenderComments(currentPostId);
        }
    }

    // --- Post Functions ---
    async function fetchAndRenderPosts() {
        if (!postFeedContainer) return;
        postFeedContainer.innerHTML = '<div style="text-align:center;">Loading posts...</div>';
        
        try {
            // First, get posts with basic info
            const { data: posts, error: postsError } = await sb
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (postsError) throw postsError;
            
            if (!posts || posts.length === 0) {
                postFeedContainer.innerHTML = '<p class="muted" style="text-align: center;">No posts found. Be the first to share! 🚀</p>';
                return;
            }

            // Get user profiles separately
            const userIds = [...new Set(posts.map(post => post.user_id))];
            const { data: profiles, error: profilesError } = await sb
                .from('profiles')
                .select('id, full_name, avatar_url')
                .in('id', userIds);

            if (profilesError) {
                console.warn('Could not fetch profiles:', profilesError);
            }

            // Get comment counts
            const postIds = posts.map(post => post.id);
            const { data: comments, error: commentsError } = await sb
                .from('comments')
                .select('post_id')
                .in('post_id', postIds);

            if (commentsError) {
                console.warn('Could not fetch comments:', commentsError);
            }

            // Get like counts
            const { data: likes, error: likesError } = await sb
                .from('likes')
                .select('post_id')
                .in('post_id', postIds);

            if (likesError) {
                console.warn('Could not fetch likes:', likesError);
            }

            // Combine data
            const postsWithData = posts.map(post => {
                const profile = profiles?.find(p => p.id === post.user_id);
                const commentCount = comments?.filter(c => c.post_id === post.id).length || 0;
                const likeCount = likes?.filter(l => l.post_id === post.id).length || 0;
                
                return {
                    ...post,
                    profile,
                    commentCount,
                    likeCount
                };
            });

            postFeedContainer.innerHTML = '';
            
            postsWithData.forEach(post => {
                const postElement = createPostElement(post);
                postFeedContainer.appendChild(postElement);
            });

        } catch (error) {
            console.error('Error fetching posts:', error);
            postFeedContainer.innerHTML = '<p class="error">⚠️ Could not load posts.</p>';
        }
    }

    function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'span-4 post-card';
        postElement.dataset.postId = post.id;
        postElement.dataset.animate = true;

        const postHtml = `
            <div class="post-header">
                <div class="post-header-left">
                    <img src="${post.profile?.avatar_url || 'default-avatar.png'}" alt="avatar">
                    <div class="post-header-info">
                        <strong>${post.profile?.full_name || 'Anonymous'}</strong>
                        <div class="muted">${new Date(post.created_at).toLocaleString()}</div>
                    </div>
                </div>
                <div class="post-header-right">
                    <button class="menu-btn"><i class="ri-more-2-fill"></i></button>
                </div>
            </div>
            <div class="post-body">
                ${post.title || ''}
                ${post.description ? `<br>${post.description}` : ''}
                ${(post.tags && post.tags.length > 0) ? `<br><span class="hashtag">#${post.tags.join(' #')}</span>` : ''}
            </div>
            ${post.media_url ? `<div class="post-media"><img src="${post.media_url}" alt="Post media"></div>` : ''}
            <div class="post-actions">
                <button class="action-btn like-btn" data-post-id="${post.id}">
                    <i class="ri-heart-line"></i>
                    <span class="like-count">${post.likeCount}</span>
                </button>
                <button class="action-btn comment-btn" data-post-id="${post.id}">
                    <i class="ri-chat-3-line"></i>
                    <span class="comment-count">${post.commentCount}</span>
                </button>
                <button class="action-btn share-btn"><i class="ri-share-forward-line"></i></button>
                <button class="action-btn"><i class="ri-bookmark-line"></i></button>
            </div>
        `;
        postElement.innerHTML = postHtml;
        return postElement;
    }

    // --- Interaction Functions ---
    async function likePost(postId) {
        try {
            const userId = window.currentUser.id;
            
            // Check if user already liked this post
            const { data: existingLike, error: checkError } = await sb
                .from('likes')
                .select('id')
                .eq('user_id', userId)
                .eq('post_id', postId)
                .single();

            if (checkError && checkError.code !== 'PGRST116') {
                throw checkError;
            }

            if (existingLike) {
                // Unlike the post
                const { error: deleteError } = await sb
                    .from('likes')
                    .delete()
                    .eq('user_id', userId)
                    .eq('post_id', postId);
                
                if (deleteError) throw deleteError;
                console.log('Post unliked successfully!');
            } else {
                // Like the post
                const { error: insertError } = await sb
                    .from('likes')
                    .insert({ user_id: userId, post_id: postId });

                if (insertError) throw insertError;
                console.log('Post liked successfully!');
            }

            // Update like count in UI immediately
            await updateLikeCount(postId);
            
        } catch (error) {
            console.error('Error toggling like:', error);
            alert('Failed to update like: ' + error.message);
        }
    }

    async function updateLikeCount(postId) {
        try {
            const { data: likes, error } = await sb
                .from('likes')
                .select('id')
                .eq('post_id', postId);

            if (error) throw error;

            const likeCount = likes?.length || 0;
            const likeBtn = document.querySelector(`[data-post-id="${postId}"].like-btn`);
            if (likeBtn) {
                const countSpan = likeBtn.querySelector('.like-count');
                if (countSpan) {
                    countSpan.textContent = likeCount;
                }
            }
        } catch (error) {
            console.error('Error updating like count:', error);
        }
    }

    async function postComment(postId, content) {
        try {
            const userId = window.currentUser.id;
            const { error } = await sb
                .from('comments')
                .insert({ user_id: userId, post_id: postId, content: content });

            if (error) throw error;
            console.log('Comment posted successfully!');
            
            // Update comment count in UI
            await updateCommentCount(postId);
            
        } catch (error) {
            console.error('Error posting comment:', error);
            alert('Failed to post comment: ' + error.message);
        }
    }

    async function updateCommentCount(postId) {
        try {
            const { data: comments, error } = await sb
                .from('comments')
                .select('id')
                .eq('post_id', postId);

            if (error) throw error;

            const commentCount = comments?.length || 0;
            const commentBtn = document.querySelector(`[data-post-id="${postId}"].comment-btn`);
            if (commentBtn) {
                const countSpan = commentBtn.querySelector('.comment-count');
                if (countSpan) {
                    countSpan.textContent = commentCount;
                }
            }
        } catch (error) {
            console.error('Error updating comment count:', error);
        }
    }

    async function fetchAndRenderComments(postId) {
        if (!commentModal) {
            console.error('Comment modal not found');
            return;
        }
        
        // Find or create comments container
        let commentsContainer = commentModal.querySelector('.comments');
        if (!commentsContainer) {
            // If comments container doesn't exist, create the entire modal content
            commentModal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Comments</h3>
                        <button id="commentClose" class="close-btn">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="comments"></div>
                        <form class="comment-form" id="commentForm">
                            <div class="comment-input-container">
                                <img src="${window.currentUser?.user_metadata?.avatar_url || 'default-avatar.png'}" alt="Your avatar" class="comment-avatar">
                                <textarea name="commentText" placeholder="Write a comment..." required></textarea>
                            </div>
                            <div class="comment-actions">
                                <button type="submit" class="btn-primary">Post Comment</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            // Re-setup event listeners for the new elements
            const newCommentForm = commentModal.querySelector('#commentForm');
            const newCloseBtn = commentModal.querySelector('#commentClose');
            
            if (newCommentForm) {
                newCommentForm.addEventListener('submit', handleCommentSubmit);
            }
            
            if (newCloseBtn) {
                newCloseBtn.addEventListener('click', () => {
                    commentModal.classList.add('hidden');
                });
            }
            
            commentsContainer = commentModal.querySelector('.comments');
        }
        
        console.log('Fetching comments for post:', postId);
        commentsContainer.innerHTML = '<div style="text-align:center; padding: 20px;">Loading comments...</div>';
        
        try {
            // Get comments first
            const { data: comments, error: commentsError } = await sb
                .from('comments')
                .select('*')
                .eq('post_id', postId)
                .order('created_at', { ascending: true });

            if (commentsError) throw commentsError;
            
            commentsContainer.innerHTML = '';
            
            if (!comments || comments.length === 0) {
                commentsContainer.innerHTML = '<div class="muted" style="text-align: center; padding: 20px;">No comments yet. Be the first to comment!</div>';
                return;
            }

            // Get user profiles for comments
            const userIds = [...new Set(comments.map(comment => comment.user_id))];
            const { data: profiles, error: profilesError } = await sb
                .from('profiles')
                .select('id, full_name, avatar_url')
                .in('id', userIds);

            if (profilesError) {
                console.warn('Could not fetch comment profiles:', profilesError);
            }

            comments.forEach(comment => {
                const profile = profiles?.find(p => p.id === comment.user_id);
                console.log('Rendering comment:', comment);
                const commentHtml = `
                    <div class="comment">
                        <div class="comment-avatar">
                            <img src="${profile?.avatar_url || 'default-avatar.png'}" alt="User">
                        </div>
                        <div class="comment-body">
                            <div class="comment-header">
                                <span class="comment-author">${profile?.full_name || 'Anonymous'}</span>
                                <div class="comment-like">
                                    <i class="ri-heart-line"></i> <span>0</span>
                                </div>
                            </div>
                            <div class="comment-text">${comment.content || 'No content'}</div>
                            <div class="comment-footer">
                                <span>Reply</span>
                                <span>Report</span>
                                <span class="comment-time">${new Date(comment.created_at).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
                commentsContainer.insertAdjacentHTML('beforeend', commentHtml);
            });
        } catch (error) {
            console.error('Error fetching comments:', error);
            commentsContainer.innerHTML = `<div class="error" style="text-align:center; padding: 20px;">⚠️ Error: ${error.message}</div>`;
        }
    }

    // --- Global Event Listeners ---
    document.addEventListener('click', async (e) => {
        // Handle navigation links
        const link = e.target.closest("a[data-link]");
        if (link) {
            e.preventDefault();
            const url = link.getAttribute("href").replace("#", "");
            const current = location.hash.replace("#", "") || "start.html";

            if (url === current) return;
            if (pageList.includes(url)) {
                loadPage(url, true);
            }
        }

        // Handle like button clicks
        const likeBtn = e.target.closest('.like-btn');
        if (likeBtn) {
            const postId = likeBtn.dataset.postId;
            await likePost(postId);
        }

        // Handle comment button clicks
        const commentBtn = e.target.closest('.comment-btn');
        if (commentBtn) {
            currentPostId = commentBtn.dataset.postId;
            if (commentModal) {
                commentModal.classList.remove('hidden');
                await fetchAndRenderComments(currentPostId);
            }
        }
    });

    // --- Real-time Listeners ---
    function setupRealtimeListeners() {
        sb.channel('public:posts')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, payload => {
                console.log('Posts change received!', payload);
                if (postFeedContainer) {
                    fetchAndRenderPosts();
                }
            })
            .subscribe();

        sb.channel('public:comments')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'comments' }, payload => {
                console.log('Comments change received!', payload);
                if (payload.new?.post_id === currentPostId && commentModal && !commentModal.classList.contains('hidden')) {
                    fetchAndRenderComments(currentPostId);
                }
                if (postFeedContainer) {
                    fetchAndRenderPosts();
                }
            })
            .subscribe();

        sb.channel('public:likes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'likes' }, payload => {
                console.log('Likes change received!', payload);
                if (postFeedContainer) {
                    fetchAndRenderPosts();
                }
            })
            .subscribe();
    }

    // --- SPA Initialization ---
    function initSPA() {
        updateDOMReferences();
        
        // Preload all pages
        pageList.forEach(async (page) => {
            try {
                const res = await fetch(page, { cache: "force-cache" });
                pageCache[page] = await res.text();
            } catch (error) {
                console.warn(`Failed to preload ${page}:`, error);
            }
        });

        let currentPage = location.hash.replace("#", "") || "start.html";
        if (!pageList.includes(currentPage)) currentPage = "start.html";

        loadPage(currentPage, false);
        history.replaceState({ url: currentPage }, null, "#" + currentPage);

        // Handle back/forward
        window.addEventListener("popstate", (e) => {
            if (e.state && e.state.url) {
                loadPage(e.state.url, false);
            }
        });
    }

    // --- App Initialization ---
    async function initApp() {
        const isAuthenticated = await checkAuth();
        if (!isAuthenticated) return;

        initSPA();
        setupRealtimeListeners();
    }

    // --- Start the App ---
    initApp();
</script>









</head>

<body>
  <!-- Splash Screen <div class="loader"></div> -->
<div id="splash">
  <div class="splash-content">
    <div class="logo"><img src="logo.png" style="height: 50px;"></div>
   
  </div>
</div>

<!-- ===== Sidebar ===== -->
<aside class="aside" aria-label="Sidebar">
<div class="brand"><span><img src="logo2.png" width="300"> </span></div>
<div class="side-search">
<i class="ri-search-2-line" aria-hidden="true"></i>
<input type="search" placeholder="Quick jump…" aria-label="Sidebar quick jump" />
</div>


<div class="side-group">

<a href="#mall.html" data-link><i class="ri-music-line"></i><span>Mi-pages</span></a>
<a href="#states.html" data-link><i class="ri-dashboard-line"></i><span>Dashboard</span></a>
<a href="#index.html" data-link><i class="ri-book-line"></i><span>Documents</span></a>

</div>

<section id="content" style="display:none;">
<!-- ===== Header ===== -->
<header class="header" role="banner">

<div class="searchbar">
<i class="ri-search-2-line" aria-hidden="true"></i>
<input type="search" id="searchAll" placeholder="Search tracks, posts, connected…"

<script>
  function toggleReplies(el) {
  const replies = el.nextElementSibling;
  if (replies.style.display === "block") {
    replies.style.display = "none";
    el.textContent = el.dataset.original || "View replies";
  } else {
    replies.style.display = "block";
    if (!el.dataset.original) el.dataset.original = el.textContent;
    el.textContent = "Hide replies";
  }
}

</script>

<script>
  window.addEventListener("load", () => {

      document.getElementById("splash").style.display = "none";
      document.getElementById("content").style.display = "block";
      document.getElementById("content").classList.add("fade-in");
    }, 2800);
  });
