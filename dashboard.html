<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// --- Supabase Config ---
const SUPABASE_URL = "https://jcrbwmpapgovyqaxajlb.supabase.co";
const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmJ3bXBhcGdvdnlxYXhhamxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNDc2NjAsImV4cCI6MjA3MjYyMzY2MH0.7jMgdHQGWfAsQ9b5C2gn8z7YqFLuA6gR_gIF0VIW56M";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// --- DOM Elements ---
const contentDiv = document.getElementById("contentize");
const navLinks = document.querySelectorAll("nav a");

// Elements for user info (make sure these exist in your HTML)
const userNameEl = document.getElementById("user-name");
const userEmailEl = document.getElementById("user-email");
const userPicEl = document.getElementById("user-pic");
const logoutBtn = document.getElementById("logout-btn");

// --- SPA Page List ---
const pageList = [
  "mall.html",
  "start.html",
  "states.html",
  "statehome.html",
  "profile.html",
  "upload.html",
];

let isTransitioning = false;
const pageCache = {}; // cache for faster reloads

// --- AUTH CHECK ---
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    // Not logged in — send back to register
    window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
    return;
  }

  console.log("✅ Logged in as:", session.user.email);
  window.currentUser = session.user;

  // Display user info
  displayUserInfo(session.user);

  // Start SPA after confirming auth
  initSPA();
}

// --- Display User Info ---
function displayUserInfo(user) {
  if (userNameEl) userNameEl.textContent = user.user_metadata.full_name || "No Name";
  if (userEmailEl) userEmailEl.textContent = user.email || "No Email";
  if (userPicEl) {
    userPicEl.src = user.user_metadata.avatar_url || "default-avatar.png";
    userPicEl.alt = user.user_metadata.full_name || "User Avatar";
  }
}

// --- Logout Handler ---
if (logoutBtn) {
  logoutBtn.addEventListener("click", async () => {
    await sb.auth.signOut();
    window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
  });
}

// --- Listen for logout or expired session ---
sb.auth.onAuthStateChange((_event, session) => {
  if (!session) {
    window.location.href = "https://stevenmsambwa8.github.io/vynal/register.html";
  }
});

// --- SPA Loader ---
async function loadPage(url, addToHistory = true) {
  if (isTransitioning) return;
  isTransitioning = true;

  try {
    contentDiv.classList.add("fade-out");

    setTimeout(async () => {
      try {
        let html;
        if (pageCache[url]) {
          html = pageCache[url];
        } else {
          const response = await fetch(url, { cache: "force-cache" });
          html = await response.text();
          pageCache[url] = html;
        }

        contentDiv.innerHTML = html;

        if (typeof initSliders === "function") {
          initSliders();
        }

        window.scrollTo({ top: 0, behavior: "smooth" });
        highlightActiveLink(url);

        if (addToHistory) {
          history.pushState({ url }, null, "#" + url);
        }

        contentDiv.classList.remove("fade-out");
        contentDiv.classList.add("fade-in");

        setTimeout(() => {
          contentDiv.classList.remove("fade-in");
          isTransitioning = false;
        }, 150);
      } catch (error) {
        contentDiv.innerHTML = "<h2 class='error'>⚠️ Page not found</h2>";
        isTransitioning = false;
      }
    }, 100);
  } catch (error) {
    console.error("❌ Load error:", error);
    isTransitioning = false;
  }
}

function highlightActiveLink(url) {
  navLinks.forEach(link => {
    link.classList.toggle("active", link.getAttribute("href") === "#" + url);
  });
}

function initSPA() {
  // Preload all pages
  pageList.forEach(async (page) => {
    try {
      const res = await fetch(page, { cache: "force-cache" });
      pageCache[page] = await res.text();
    } catch {}
  });

  let currentPage = location.hash.replace("#", "") || "start.html";
  if (!pageList.includes(currentPage)) currentPage = "start.html";

  loadPage(currentPage, false);
  history.replaceState({ url: currentPage }, null, "#" + currentPage);

  // Handle clicks
  document.addEventListener("click", (e) => {
    const link = e.target.closest("a[data-link]");
    if (link) {
      e.preventDefault();
      const url = link.getAttribute("href").replace("#", "");
      const current = location.hash.replace("#", "") || "start.html";

      if (url === current) return;
      if (pageList.includes(url)) {
        loadPage(url, true);
      }
    }
  });

  // Handle back/forward
  window.addEventListener("popstate", (e) => {
    if (e.state && e.state.url) {
      loadPage(e.state.url, false);
    }
  });
}

// --- Start ---
checkAuth();
</script>

<script>
  function toggleReplies(el) {
  const replies = el.nextElementSibling;
  if (replies.style.display === "block") {
    replies.style.display = "none";
    el.textContent = el.dataset.original || "View replies";
  } else {
    replies.style.display = "block";
    if (!el.dataset.original) el.dataset.original = el.textContent;
    el.textContent = "Hide replies";
  }
}

</script>

<script>
