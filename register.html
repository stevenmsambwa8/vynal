<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🔥 Modern Dark Auth - Supabase</title>
<style>
/* Keep your existing CSS exactly the same */
</style>

<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script type="module">
  // ✅ Initialize Supabase
  const SUPABASE_URL = "https://jcrbwmpapgovyqaxajlb.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjcmJ3bXBhcGdvdnlxYXhhamxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcwNDc2NjAsImV4cCI6MjA3MjYyMzY2MH0.7jMgdHQGWfAsQ9b5C2gn8z7YqFLuA6gR_gIF0VIW56M";
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ✅ Get form elements
  const signupForm = document.getElementById("signup-form");
  const signinForm = document.querySelector("form.active");
  const googleSignupBtn = document.getElementById("google-signup-btn");
  const googleSigninBtn = document.getElementById("google-signin-btn");

  // ✅ Sign Up with Email + Password
  if (signupForm) {
    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-pass").value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { full_name: name },
          emailRedirectTo: window.location.origin + "/dashboard.html"
        }
      });

      if (error) {
        alert("❌ " + error.message);
      } else {
        alert("✅ Account created! Check your email to confirm.");
      }
    });
  }

  // ✅ Sign In with Email + Password
  if (signinForm) {
    signinForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("signin-email").value.trim();
      const password = document.getElementById("signin-pass").value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        alert("❌ " + error.message);
      } else {
        alert("✅ Welcome back!");
        window.location.href = "/dashboard.html"; // Redirect after login
      }
    });
  }

  // ✅ Google OAuth Sign-In
  async function handleGoogleLogin() {
    const { data, error } = await supabase.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: window.location.origin + "/dashboard.html"
      }
    });

    if (error) {
      alert("❌ " + error.message);
    }
  }

  googleSignupBtn?.addEventListener("click", handleGoogleLogin);
  googleSigninBtn?.addEventListener("click", handleGoogleLogin);

  // ✅ Check Session & Auto-Redirect
  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session && window.location.pathname === "/auth.html") {
      window.location.href = "/dashboard.html";
    }
  }
  checkSession();
</script>
</head>

<body>
<div class="auth-wrapper">
  <div class="forms-container" id="forms-container">
    <!-- Signin Form -->
    <form class="active" id="signin-form">
      <h1>Welcome Back</h1>
      <p class="subtext">Sign in to continue</p>
      <div class="input-group">
        <input type="email" id="signin-email" class="input" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <input type="password" id="signin-pass" class="input" placeholder="Password" required>
        <span class="toggle-eye" onclick="togglePassword('signin-pass', this)">👁</span>
      </div>
      <button type="submit" class="btn">Continue</button>
      <div class="divider">or</div>
      <button type="button" class="social-btn" id="google-signin-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        Continue with Google
      </button>
      <span class="toggle-link" onclick="toggleForm()">Don’t have an account? Sign up</span>
    </form>

    <!-- Signup Form -->
    <form id="signup-form">
      <h1>Create Account</h1>
      <p class="subtext">Join us in seconds</p>
      <div class="input-group">
        <input type="text" id="signup-name" class="input" placeholder="Full Name" required>
      </div>
      <div class="input-group">
        <input type="email" id="signup-email" class="input" placeholder="Email address" required>
      </div>
      <div class="input-group">
        <input type="password" id="signup-pass" class="input" placeholder="Password" required>
        <span class="toggle-eye" onclick="togglePassword('signup-pass', this)">👁</span>
      </div>
      <button type="submit" class="btn">Sign Up</button>
      <div class="divider">or</div>
      <button type="button" class="social-btn" id="google-signup-btn">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        Continue with Google
      </button>
      <span class="toggle-link" onclick="toggleForm()">Already have an account? Sign in</span>
    </form>
  </div>
</div>

<script>
let showingSignIn = true;
function toggleForm() {
  const container = document.getElementById('forms-container');
  const signinForm = document.getElementById('signin-form');
  const signupForm = document.getElementById('signup-form');
  if (showingSignIn) {
    container.style.transform = 'translateX(-50%)';
    signinForm.classList.remove('active');
    signupForm.classList.add('active');
  } else {
    container.style.transform = 'translateX(0)';
    signupForm.classList.remove('active');
    signinForm.classList.add('active');
  }
  showingSignIn = !showingSignIn;
}

function togglePassword(id, el) {
  const input = document.getElementById(id);
  if (input.type === "password") { input.type = "text"; el.textContent = "🙈"; }
  else { input.type = "password"; el.textContent = "👁"; }
}
</script>
</body>
</html>
